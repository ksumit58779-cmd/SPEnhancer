<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Library — SPEnhancer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --mars-core:#c1440e;--mars-hot:#ff6b35;--mars-glow:#e05a1a;
  --mars-dim:rgba(224,90,26,0.12);--mars-rim:rgba(224,90,26,0.25);
  --bg:#0a0502;--surface:#130b06;--card:#1a0f08;--card2:#211408;
  --border:#2e1a0e;--border-hot:rgba(224,90,26,0.35);
  --text:#f5ddc8;--text-2:#c4956a;--text-3:#7a5030;
  --nav-bg:rgba(10,5,2,0.88);
  --glow-spread:0 0 30px rgba(224,90,26,0.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
::selection{background:var(--mars-dim);color:var(--mars-hot);}

#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;}
.atmo-glow{position:fixed;bottom:-200px;left:50%;transform:translateX(-50%);width:900px;height:400px;background:radial-gradient(ellipse at center bottom,rgba(193,68,14,0.12) 0%,transparent 70%);pointer-events:none;z-index:1;}
.dust-particle{position:fixed;border-radius:50%;pointer-events:none;z-index:1;opacity:0;animation:dustFloat linear infinite;}
@keyframes dustFloat{0%{opacity:0;transform:translateY(100vh);}10%{opacity:.3;}90%{opacity:.1;}100%{opacity:0;transform:translateY(-20px) translateX(var(--dx,30px));}}

@keyframes pageReveal{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes navDrop{from{opacity:0;transform:translateY(-100%);}to{opacity:1;transform:translateY(0);}}
@keyframes marsOrbit{0%,100%{box-shadow:0 0 15px rgba(224,90,26,0.5),0 0 30px rgba(193,68,14,0.2);}50%{box-shadow:0 0 25px rgba(224,90,26,0.7),0 0 50px rgba(193,68,14,0.3);}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1rem;animation:navDrop .5s cubic-bezier(.4,0,.2,1) both;}
nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--mars-glow),transparent);opacity:.4;}
.nav-logo{display:flex;align-items:center;gap:.75rem;text-decoration:none;flex-shrink:0;}
.logo-planet{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e8693a 0%,#c1440e 40%,#8b2a06 70%,#5a1a03 100%);position:relative;flex-shrink:0;box-shadow:0 0 15px rgba(224,90,26,0.5);animation:marsOrbit 4s ease-in-out infinite;overflow:hidden;}
.logo-planet::before{content:'';position:absolute;top:30%;left:20%;width:50%;height:20%;background:rgba(255,255,255,0.12);border-radius:50%;transform:rotate(-15deg);filter:blur(2px);}
.logo-planet::after{content:'';position:absolute;top:55%;left:30%;width:40%;height:15%;background:rgba(139,42,6,0.6);border-radius:50%;filter:blur(3px);}
.logo-text-block{display:flex;flex-direction:column;line-height:1;}
.logo-main{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;color:var(--text);letter-spacing:.05em;}
.logo-main span{color:var(--mars-hot);}
.logo-sub{font-size:.6rem;font-weight:400;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase;margin-top:.1rem;}
.nav-links{display:flex;gap:.25rem;flex:1;justify-content:center;}
.nav-links a{color:var(--text-3);text-decoration:none;font-size:.82rem;font-weight:600;padding:.35rem .85rem;border-radius:8px;transition:all .2s;white-space:nowrap;letter-spacing:.02em;}
.nav-links a:hover{color:var(--text);background:var(--mars-dim);}
.nav-links a.active{color:var(--mars-hot);background:var(--mars-dim);border:1px solid var(--mars-rim);}
.nav-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
.nav-btn{width:36px;height:36px;background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--text-3);font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.nav-btn:hover{border-color:var(--mars-glow);color:var(--mars-hot);background:var(--mars-dim);}
.menu-btn{display:none;width:36px;height:36px;background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--text-3);font-size:1rem;align-items:center;justify-content:center;transition:all .2s;}
.mobile-nav{display:none;position:fixed;top:60px;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;flex-direction:column;gap:.25rem;z-index:99;}
.mobile-nav.open{display:flex;}
.mobile-nav a{color:var(--text-2);text-decoration:none;font-size:.9rem;font-weight:600;padding:.6rem .85rem;border-radius:8px;transition:all .2s;}
.mobile-nav a:hover{color:var(--text);background:var(--mars-dim);}
.mobile-nav a.active{color:var(--mars-hot);background:var(--mars-dim);}

/* SETTINGS */
.settings-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s;}
.settings-overlay.open{opacity:1;pointer-events:all;}
.settings-panel{position:fixed;top:0;right:-340px;bottom:0;width:300px;z-index:201;background:var(--surface);border-left:1px solid var(--border);transition:right .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:1.5rem;gap:1.5rem;}
.settings-panel.open{right:0;}
.settings-header{display:flex;align-items:center;justify-content:space-between;}
.settings-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--text);letter-spacing:.05em;}
.settings-close{width:30px;height:30px;background:none;border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text-3);font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.settings-close:hover{border-color:var(--mars-glow);color:var(--mars-hot);}
.settings-section{display:flex;flex-direction:column;gap:.75rem;}
.settings-label{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);}
.danger-btn{width:100%;padding:.65rem;background:rgba(193,68,14,.08);border:1px solid rgba(193,68,14,.3);color:#ff6b6b;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:600;border-radius:10px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem;}
.danger-btn:hover{background:rgba(193,68,14,.15);}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:80px 1.25rem 4rem;position:relative;z-index:2;}

/* PAGE HEADER */
.page-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem;
  animation:pageReveal .6s cubic-bezier(.4,0,.2,1) .1s both;
}
.page-title{font-family:'Cinzel',serif;font-size:clamp(1.3rem,4vw,1.8rem);font-weight:700;letter-spacing:.02em;color:var(--text);}
.page-title span{color:var(--mars-hot);text-shadow:0 0 20px rgba(255,107,53,0.3);}
.page-sub{color:var(--text-3);font-size:.83rem;margin-top:.3rem;}
.results-info{font-size:.8rem;color:var(--text-3);font-weight:600;align-self:flex-end;}

/* SEARCH */
.search-wrap{
  position:relative;margin-bottom:1.25rem;
  animation:pageReveal .6s cubic-bezier(.4,0,.2,1) .15s both;
}
.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:.95rem;pointer-events:none;}
.search-input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:.75rem 2.75rem .75rem 2.75rem;
  font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:400;
  color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s;
  caret-color:var(--mars-hot);
}
.search-input::placeholder{color:var(--text-3);}
.search-input:focus{border-color:var(--mars-rim);box-shadow:0 0 0 2px var(--mars-dim),var(--glow-spread);}
.search-clear{
  position:absolute;right:.75rem;top:50%;transform:translateY(-50%);
  background:var(--card);border:1px solid var(--border);color:var(--text-3);
  cursor:pointer;width:26px;height:26px;border-radius:6px;
  font-size:.75rem;display:none;align-items:center;justify-content:center;
  transition:all .2s;
}
.search-clear.show{display:flex;}
.search-clear:hover{color:var(--mars-hot);border-color:var(--mars-glow);}

/* CATEGORY TABS */
.cat-tabs{
  display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1.5rem;
  animation:pageReveal .6s cubic-bezier(.4,0,.2,1) .2s both;
}
.cat-tab{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text-3);cursor:pointer;font-family:'Nunito',sans-serif;
  font-size:.77rem;font-weight:600;padding:.3rem .8rem;
  border-radius:8px;transition:all .2s;letter-spacing:.02em;white-space:nowrap;
}
.cat-tab:hover{border-color:var(--mars-glow);color:var(--text);}
.cat-tab.active{background:var(--mars-dim);border-color:var(--mars-rim);color:var(--mars-hot);}

/* GRID */
.prompts-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:.85rem;
  animation:pageReveal .6s cubic-bezier(.4,0,.2,1) .25s both;
}

/* PROMPT CARD */
.p-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:1.1rem;
  display:flex;flex-direction:column;gap:.65rem;
  cursor:pointer;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  animation:cardIn .3s cubic-bezier(.4,0,.2,1) both;
  position:relative;overflow:hidden;
}
.p-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--mars-glow),transparent);opacity:0;transition:opacity .2s;}
.p-card:hover{border-color:var(--border-hot);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.4),var(--glow-spread);}
.p-card:hover::before{opacity:.5;}
.p-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;}
.p-card-title{font-family:'Cinzel',serif;font-size:.88rem;font-weight:600;color:var(--text);letter-spacing:.02em;line-height:1.4;}
.cat-badge{
  flex-shrink:0;font-size:.62rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;padding:.15rem .55rem;border-radius:100px;
  background:var(--mars-dim);color:var(--mars-hot);border:1px solid var(--mars-rim);
  white-space:nowrap;
}
.p-preview{
  font-size:.82rem;color:var(--text-2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  line-clamp:3;overflow:hidden;
}
.p-actions{display:flex;gap:.45rem;margin-top:.1rem;}
.p-btn{
  flex:1;padding:.45rem .65rem;
  font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:700;
  cursor:pointer;border-radius:9px;transition:all .2s;letter-spacing:.02em;
  display:flex;align-items:center;justify-content:center;gap:.3rem;
}
.p-btn-copy{background:var(--card);border:1px solid var(--border);color:var(--text-2);}
.p-btn-copy:hover{border-color:var(--mars-glow);color:var(--mars-hot);background:var(--mars-dim);}
.p-btn-use{background:linear-gradient(135deg,var(--mars-core),var(--mars-glow));border:none;color:#fff;box-shadow:0 2px 10px rgba(193,68,14,0.3);}
.p-btn-use:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(193,68,14,0.4);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:1rem;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.prompt-modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.75rem;max-width:580px;width:100%;transform:scale(.9) translateY(20px);transition:all .35s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;gap:1.1rem;max-height:85vh;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.7),var(--glow-spread);}
.modal-overlay.show .prompt-modal{transform:scale(1) translateY(0);}
.prompt-modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:20px 20px 0 0;background:linear-gradient(90deg,transparent,var(--mars-glow),transparent);opacity:.5;}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
.modal-title{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:600;color:var(--text);letter-spacing:.03em;line-height:1.4;}
.modal-close{width:32px;height:32px;flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--text-3);font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{border-color:var(--mars-glow);color:var(--mars-hot);}
.modal-cat-badge{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.18rem .65rem;border-radius:100px;background:var(--mars-dim);color:var(--mars-hot);border:1px solid var(--mars-rim);align-self:flex-start;}
.modal-prompt-text{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;font-size:.88rem;line-height:1.7;color:var(--text-2);overflow-y:auto;max-height:300px;white-space:pre-wrap;word-break:break-word;}
.modal-actions{display:flex;gap:.6rem;flex-wrap:wrap;}
.modal-btn{
  flex:1;min-width:120px;padding:.65rem 1rem;
  font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;
  cursor:pointer;border-radius:11px;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:.4rem;
}
.modal-btn-copy{background:var(--card2);border:1px solid var(--border);color:var(--text-2);}
.modal-btn-copy:hover{border-color:var(--mars-glow);color:var(--mars-hot);}
.modal-btn-use{background:linear-gradient(135deg,var(--mars-core),var(--mars-glow));border:none;color:#fff;box-shadow:0 4px 16px rgba(193,68,14,0.35);}
.modal-btn-use:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(193,68,14,0.45);}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.85rem;padding:5rem 2rem;color:var(--text-3);text-align:center;grid-column:1/-1;}
.empty-planet{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#6b3020 0%,#3a1808 50%,#1a0a03 100%);box-shadow:0 0 20px rgba(193,68,14,0.1);}
.empty-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--text-2);letter-spacing:.03em;}
.empty-sub{font-size:.82rem;max-width:240px;line-height:1.6;}

/* SKELETON */
.skel-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.1rem;display:flex;flex-direction:column;gap:.65rem;}
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--card2) 50%,var(--surface) 75%);background-size:200% 100%;animation:skelAnim 1.6s infinite;border-radius:6px;}
@keyframes skelAnim{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* TOAST */
.toast{position:fixed;bottom:1.75rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);border:1px solid var(--border-hot);color:var(--text);font-size:.82rem;font-weight:600;padding:.55rem 1.2rem;border-radius:100px;white-space:nowrap;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* RESPONSIVE */
@media(max-width:640px){.nav-links{display:none;}.menu-btn{display:flex;}.settings-panel{width:100%;right:-100%;}.prompts-grid{grid-template-columns:1fr;}.page-header{flex-direction:column;align-items:flex-start;}}
@media(max-width:400px){nav{padding:0 1rem;}.logo-text-block{display:none;}main{padding:72px .75rem 3rem;}}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="atmo-glow"></div>

<nav>
  <a href="/" class="nav-logo">
    <div class="logo-planet"></div>
    <div class="logo-text-block">
      <div class="logo-main">SP<span>Enhancer</span></div>
      <div class="logo-sub">Mars Edition</div>
    </div>
  </a>
  <div class="nav-links">
    <a href="/">⚡ Enhance</a>
    <a href="/history">📋 History</a>
    <a href="/library" class="active">📚 Library</a>
  </div>
  <div class="nav-right">
    <button class="nav-btn" id="settingsBtn">⚙</button>
    <button class="menu-btn" id="menuBtn">☰</button>
  </div>
</nav>

<div class="mobile-nav" id="mobileNav">
  <a href="/">⚡ Enhance</a>
  <a href="/history">📋 History</a>
  <a href="/library" class="active">📚 Library</a>
</div>

<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <span class="settings-title">Mission Control</span>
    <button class="settings-close" id="settingsClose">✕</button>
  </div>
  <div class="settings-section">
    <div class="settings-label">Data</div>
    <button class="danger-btn" id="settingsClearBtn">🗑 Clear Prompt History</button>
  </div>
</div>

<!-- PROMPT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="prompt-modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-cat-badge" id="modalCat"></div>
    <div class="modal-prompt-text" id="modalText"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-copy" id="modalCopyBtn">📋 Copy Prompt</button>
      <button class="modal-btn modal-btn-use" id="modalUseBtn">🚀 Use & Enhance</button>
    </div>
  </div>
</div>

<main>
  <div class="page-header">
    <div>
      <div class="page-title">Prompt <span>Arsenal</span></div>
      <div class="page-sub">1000+ high-quality prompts across every domain</div>
    </div>
    <div class="results-info" id="resultsInfo">Loading...</div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search the prompt arsenal..."/>
    <button class="search-clear" id="searchClear">✕</button>
  </div>

  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" data-cat="all">🌌 All</button>
  </div>

  <div class="prompts-grid" id="promptsGrid">
    <!-- skeleton -->
    <div class="skel-card"><div class="skeleton" style="height:14px;width:60%"></div><div class="skeleton" style="height:12px;width:40%"></div><div class="skeleton" style="height:60px"></div><div class="skeleton" style="height:34px"></div></div>
    <div class="skel-card"><div class="skeleton" style="height:14px;width:50%"></div><div class="skeleton" style="height:12px;width:35%"></div><div class="skeleton" style="height:60px"></div><div class="skeleton" style="height:34px"></div></div>
    <div class="skel-card"><div class="skeleton" style="height:14px;width:55%"></div><div class="skeleton" style="height:12px;width:30%"></div><div class="skeleton" style="height:60px"></div><div class="skeleton" style="height:34px"></div></div>
    <div class="skel-card"><div class="skeleton" style="height:14px;width:65%"></div><div class="skeleton" style="height:12px;width:40%"></div><div class="skeleton" style="height:60px"></div><div class="skeleton" style="height:34px"></div></div>
    <div class="skel-card"><div class="skeleton" style="height:14px;width:45%"></div><div class="skeleton" style="height:12px;width:33%"></div><div class="skeleton" style="height:60px"></div><div class="skeleton" style="height:34px"></div></div>
    <div class="skel-card"><div class="skeleton" style="height:14px;width:58%"></div><div class="skeleton" style="height:12px;width:38%"></div><div class="skeleton" style="height:60px"></div><div class="skeleton" style="height:34px"></div></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
/* STARS */
(function(){
  var canvas=document.getElementById('stars-canvas');var ctx=canvas.getContext('2d');var stars=[];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;stars=[];for(var i=0;i<150;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*.9+.2,o:Math.random()*.6+.1,speed:Math.random()*.3+.1,phase:Math.random()*Math.PI*2});}
  function draw(t){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(function(s){var tw=s.o*(0.5+0.5*Math.sin(t/1000*s.speed+s.phase));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,248,240,'+tw+')';ctx.fill();});requestAnimationFrame(draw);}
  window.addEventListener('resize',resize);resize();requestAnimationFrame(draw);
})();

/* DUST */
(function(){
  for(var i=0;i<10;i++){(function(idx){setTimeout(function(){var d=document.createElement('div');d.className='dust-particle';var x=Math.random()*100;var dur=14+Math.random()*18;var dx=(Math.random()-.5)*100;d.style.cssText='left:'+x+'%;bottom:0;--dx:'+dx+'px;animation-duration:'+dur+'s;animation-delay:'+(Math.random()*8)+'s;width:'+(1+Math.random()*2)+'px;height:'+(1+Math.random()*2)+'px;background:#e05a1a;';document.body.appendChild(d);},idx*700);})(i);}
})();

var allPrompts=[];
var filteredPrompts=[];
var activeCategory='all';
var searchQuery='';
var currentModalPrompt=null;

/* LOAD */
function loadLibrary(){
  fetch('/api/library')
    .then(function(r){return r.json();})
    .then(function(data){
      allPrompts=Array.isArray(data)?data:[];
      buildCategoryTabs();
      applyFilters();
    })
    .catch(function(){
      document.getElementById('promptsGrid').innerHTML='<div class="empty-state"><div class="empty-planet"></div><div class="empty-title">Server Offline</div><div class="empty-sub">Run: cd Backend && python app.py</div></div>';
      document.getElementById('resultsInfo').textContent='Error';
    });
}

/* BUILD CATEGORY TABS */
function buildCategoryTabs(){
  var counts={};
  allPrompts.forEach(function(p){counts[p.category]=(counts[p.category]||0)+1;});
  var tabs=document.getElementById('catTabs');
  tabs.innerHTML='';
  var allBtn=document.createElement('button');
  allBtn.className='cat-tab active';allBtn.setAttribute('data-cat','all');
  allBtn.textContent='🌌 All ('+allPrompts.length+')';
  allBtn.addEventListener('click',function(){setCategory('all');});
  tabs.appendChild(allBtn);
  var catIcons={coding:'💻',writing:'✍️',business:'💼',education:'🎓',creative:'🎨',marketing:'📣',productivity:'⚡',health:'💪',finance:'💰',design:'🖌️',career:'🚀',science:'🔬',technology:'🤖',psychology:'🧠',travel:'✈️',parenting:'👨‍👩‍👦',environment:'🌿'};
  Object.keys(counts).sort().forEach(function(cat){
    var btn=document.createElement('button');
    btn.className='cat-tab';btn.setAttribute('data-cat',cat);
    var icon=catIcons[cat]||'🪐';
    var label=cat.charAt(0).toUpperCase()+cat.slice(1);
    btn.textContent=icon+' '+label+' ('+counts[cat]+')';
    btn.addEventListener('click',function(){setCategory(cat);});
    tabs.appendChild(btn);
  });
}

function setCategory(cat){
  activeCategory=cat;
  document.querySelectorAll('.cat-tab').forEach(function(b){b.classList.remove('active');});
  var active=document.querySelector('[data-cat="'+cat+'"]');
  if(active)active.classList.add('active');
  applyFilters();
}

/* SEARCH */
var searchEl=document.getElementById('searchInput');
var clearEl=document.getElementById('searchClear');
searchEl.addEventListener('input',function(){
  searchQuery=searchEl.value.trim().toLowerCase();
  clearEl.classList.toggle('show',searchQuery.length>0);
  if(searchQuery.length>0){
    fetch('/api/library/search?q='+encodeURIComponent(searchEl.value.trim()))
      .then(function(r){return r.json();})
      .then(function(data){allPrompts=Array.isArray(data)?data:[];applyFilters();})
      .catch(function(){});
  } else {
    loadLibrary();
  }
});
clearEl.addEventListener('click',function(){
  searchEl.value='';searchQuery='';clearEl.classList.remove('show');loadLibrary();
});

/* FILTER & RENDER */
function applyFilters(){
  filteredPrompts=activeCategory==='all'?allPrompts:allPrompts.filter(function(p){return p.category===activeCategory;});
  document.getElementById('resultsInfo').textContent='Showing '+filteredPrompts.length+' of '+allPrompts.length+' prompts';
  renderGrid();
}

function renderGrid(){
  var grid=document.getElementById('promptsGrid');
  grid.innerHTML='';
  if(filteredPrompts.length===0){
    var es=document.createElement('div');es.className='empty-state';
    var ep=document.createElement('div');ep.className='empty-planet';
    var et=document.createElement('div');et.className='empty-title';et.textContent='No Results Found';
    var esub=document.createElement('div');esub.className='empty-sub';esub.textContent='Try a different search or category.';
    es.appendChild(ep);es.appendChild(et);es.appendChild(esub);grid.appendChild(es);return;
  }
  filteredPrompts.forEach(function(p,i){
    var card=document.createElement('div');card.className='p-card';card.style.animationDelay=(i*0.025)+'s';
    var top=document.createElement('div');top.className='p-card-top';
    var title=document.createElement('div');title.className='p-card-title';title.textContent=p.title||'Untitled';
    var badge=document.createElement('div');badge.className='cat-badge';badge.textContent=p.category||'';
    top.appendChild(title);top.appendChild(badge);
    var preview=document.createElement('div');preview.className='p-preview';preview.textContent=p.prompt||'';
    var actions=document.createElement('div');actions.className='p-actions';
    var copyBtn=document.createElement('button');copyBtn.className='p-btn p-btn-copy';copyBtn.innerHTML='📋 Copy';
    copyBtn.addEventListener('click',function(e){e.stopPropagation();navigator.clipboard.writeText(p.prompt||'').then(function(){showToast('📋 Copied!');});});
    var useBtn=document.createElement('button');useBtn.className='p-btn p-btn-use';useBtn.innerHTML='🚀 Use';
    useBtn.addEventListener('click',function(e){e.stopPropagation();localStorage.setItem('reuse_prompt',p.prompt||'');window.location.href='/';});
    actions.appendChild(copyBtn);actions.appendChild(useBtn);
    card.appendChild(top);card.appendChild(preview);card.appendChild(actions);
    card.addEventListener('click',function(){openModal(p);});
    grid.appendChild(card);
  });
}

/* MODAL */
function openModal(p){
  currentModalPrompt=p;
  document.getElementById('modalTitle').textContent=p.title||'Untitled';
  document.getElementById('modalCat').textContent=p.category||'';
  document.getElementById('modalText').textContent=p.prompt||'';
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
document.getElementById('modalCopyBtn').addEventListener('click',function(){
  if(!currentModalPrompt)return;
  navigator.clipboard.writeText(currentModalPrompt.prompt||'').then(function(){showToast('📋 Copied!');});
});
document.getElementById('modalUseBtn').addEventListener('click',function(){
  if(!currentModalPrompt)return;
  localStorage.setItem('reuse_prompt',currentModalPrompt.prompt||'');
  window.location.href='/';
});

/* SETTINGS */
function openSettings(){document.getElementById('settingsPanel').classList.add('open');document.getElementById('settingsOverlay').classList.add('open');}
function closeSettings(){document.getElementById('settingsPanel').classList.remove('open');document.getElementById('settingsOverlay').classList.remove('open');}
document.getElementById('settingsBtn').addEventListener('click',openSettings);
document.getElementById('settingsClose').addEventListener('click',closeSettings);
document.getElementById('settingsOverlay').addEventListener('click',closeSettings);
document.getElementById('settingsClearBtn').addEventListener('click',function(){
  if(!confirm('Clear all history?'))return;
  fetch('/api/history/clear',{method:'DELETE'}).then(function(){showToast('History cleared!');closeSettings();}).catch(function(){showToast('Error');});
});

document.getElementById('menuBtn').addEventListener('click',function(){document.getElementById('mobileNav').classList.toggle('open');});

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

loadLibrary();
</script>
</body>
</html>
